<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Madinat Al Saada</title>
  <meta name="theme-color" content="#1a3a5c">
  <link rel="icon" type="image/webp" href="img/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;font-size:16px}
    body{font-family:'DM Sans',sans-serif;color:#fff;background:var(--navy-deeper);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
    img{display:block;max-width:100%;height:auto}
    a{color:inherit;text-decoration:none}
    button{font:inherit;cursor:pointer;border:none;background:none}
    ::selection{background:#1a3a5c;color:#fff}
    :root{
      --navy:#1a3a5c;--navy-light:#264d73;--navy-dark:#0f2840;--navy-deeper:#091c30;
      --accent:#1a3a5c;--accent-light:#4a7da8;
      --white:#fff;--gray-50:#f8fafb;--gray-100:#f1f3f5;--gray-200:#e2e5e9;
      --gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-900:#111827;
      --ease:cubic-bezier(.16,1,.3,1);
    }
    .skip{position:absolute;top:-100%;left:16px;padding:8px 16px;background:var(--navy);color:#fff;font-size:14px;z-index:9999}
    .skip:focus{top:16px}
    a:focus-visible,button:focus-visible{outline:2px solid rgba(255,255,255,.5);outline-offset:3px}

    /* NAV */
    .nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;background:transparent}
    @media(min-width:768px){.nav{padding:0 40px}}
    .nav__wrap{display:flex;align-items:center;justify-content:space-between;height:72px;max-width:1400px;margin:0 auto}
    @media(min-width:768px){.nav__wrap{height:80px}}
    .nav__logo{display:flex;align-items:center;gap:12px;cursor:pointer}
    .nav__logo img{height:40px;width:auto}
    @media(min-width:768px){.nav__logo img{height:46px}}
    .nav__logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:#fff}
    @media(min-width:768px){.nav__logo-text{font-size:19px}}
    @media(max-width:767px){.nav__logo-text{display:none}}
    .nav__back{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:rgba(255,255,255,.5);transition:color .2s;cursor:pointer}
    .nav__back:hover{color:#fff}
    .nav__back svg{width:18px;height:18px}

    /* ERROR */
    .error{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px}
    .error__inner{max-width:480px}
    .error__code{font-family:'Playfair Display',serif;font-size:clamp(8rem,20vw,14rem);font-weight:700;color:#fff;line-height:1;opacity:.08;margin-bottom:-24px;letter-spacing:-.04em;text-transform:uppercase}
    .error__title{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;color:#fff;margin-bottom:16px;letter-spacing:-.02em;text-transform:uppercase}
    .error__title em{font-style:italic;font-weight:400;text-transform:none}
    .error__text{color:rgba(255,255,255,.5);font-size:17px;line-height:1.7;margin-bottom:40px}
    .error__btn{display:inline-flex;align-items:center;gap:8px;padding:16px 40px;font-size:13px;font-weight:600;color:var(--navy-deeper);background:#fff;transition:all .25s;cursor:pointer;letter-spacing:.05em;text-transform:uppercase}
    .error__btn:hover{background:var(--gray-100);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
    .error__btn svg{width:18px;height:18px}

    /* FOOTER */
    .foot{background:var(--navy-deeper);padding:24px;text-align:center;border-top:1px solid rgba(255,255,255,.08)}
    .foot p{font-size:12px;color:rgba(255,255,255,.25);margin:0}
  </style>
</head>
<body>

<a href="#main" class="skip">Skip to content</a>

<!-- NAV -->
<nav class="nav">
  <div class="nav__wrap">
    <a href="/" class="nav__logo"><img src="img/logo.webp" alt="Madinat Al Saada" width="42" height="42"><span class="nav__logo-text">Madinat Al Saada</span></a>
    <a href="/" class="nav__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
  </div>
</nav>

<!-- ERROR -->
<main class="error" id="main">
  <div class="error__inner">
    <div class="error__code">404</div>
    <h1 class="error__title">PAGE NOT <em>Found</em></h1>
    <p class="error__text">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="error__btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Homepage
    </a>
  </div>
</main>

<!-- FOOTER -->
<footer class="foot">
  <p>&copy; <span class="yr">2026</span> Madinat Al Saada Aluminium &amp; Glass Works LLC</p>
</footer>

<script>
(function(){
  var yrs=document.querySelectorAll('.yr');for(var i=0;i<yrs.length;i++)yrs[i].textContent=new Date().getFullYear();
})();
</script>

</body>
</html>
