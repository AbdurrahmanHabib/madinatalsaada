<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Madinat Al Saada</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/assets/images/logo.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-primary: #0a4d8c;
      --clr-primary-dark: #083a6a;
      --clr-accent: #e8a530;
      --clr-bg: #f8fafc;
      --clr-text: #1e293b;
      --clr-muted: #64748b;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-heading: 'Poppins', 'Inter', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--clr-bg);
      color: var(--clr-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar-404 {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-404__brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--clr-primary);
    }

    .navbar-404__brand img {
      height: 40px;
      width: auto;
    }

    .navbar-404__brand span {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 1.125rem;
    }

    .navbar-404__back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--clr-primary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9375rem;
      transition: color 0.2s;
    }

    .navbar-404__back:hover {
      color: var(--clr-primary-dark);
    }

    /* Main content */
    .error-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .error-page__inner {
      max-width: 480px;
    }

    .error-page__code {
      font-family: var(--font-heading);
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 700;
      color: var(--clr-primary);
      line-height: 1;
      opacity: 0.15;
      margin-bottom: -1rem;
    }

    .error-page__title {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--clr-text);
      margin-bottom: 1rem;
    }

    .error-page__text {
      color: var(--clr-muted);
      font-size: 1.0625rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .error-page__btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--clr-primary);
      color: #fff;
      padding: 0.875rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s, transform 0.15s;
    }

    .error-page__btn:hover {
      background: var(--clr-primary-dark);
      transform: translateY(-1px);
    }

    .error-page__btn svg {
      width: 18px;
      height: 18px;
    }

    /* Footer */
    .footer-404 {
      text-align: center;
      padding: 1.5rem 2rem;
      border-top: 1px solid #e2e8f0;
      color: var(--clr-muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

  <!-- Minimal Navbar -->
  <nav class="navbar-404">
    <a href="/" class="navbar-404__brand">
      <img src="/assets/images/logo.png" alt="Madinat Al Saada Logo">
      <span>Madinat Al Saada</span>
    </a>
    <a href="/" class="navbar-404__back">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Home
    </a>
  </nav>

  <!-- Error Content -->
  <main class="error-page">
    <div class="error-page__inner">
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">Page Not Found</h1>
      <p class="error-page__text">
        The page you're looking for doesn't exist or has been moved.
      </p>
      <a href="/" class="error-page__btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Back to Homepage
      </a>
    </div>
  </main>

  <!-- Minimal Footer -->
  <footer class="footer-404">
    &copy; <span class="current-year">2026</span> Madinat Al Saada Aluminium & Glass Works LLC. All rights reserved.
  </footer>

  <script>
    document.querySelectorAll('.current-year').forEach(function(el) {
      el.textContent = new Date().getFullYear();
    });
  </script>

</body>
</html>
